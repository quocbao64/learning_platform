version:  '3.8'
services:
    app:
        build: .
        container_name: api
        ports:
            - "8080:8080"
        depends_on:
          - postgres
        env_file:
          - /etc/learning_platform/prod.env
        networks:
            - default

    postgres:
        image: postgres:latest
        container_name: postgres
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        environment:
            PGDATA: /var/lib/postgresql/data/pgdata
        env_file:
          - /etc/learning_platform/prod.db.env
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -dd ${DB_NAME}"]
          interval: 10s
          timeout: 5s
          retries: 1
        networks:
            - default

    redis:
        image: redis:latest
        container_name: redis
        ports:
            - "6379:6379"
        healthcheck:
          test: ["CMD", "redis-cli", "ping"]
          interval: 10s
          timeout: 5s
          retries: 1
        networks:
            - default
volumes:
    postgres_data:

networks:
    default:
        name: learning_platform_network
